name: .NET Build Jellyfin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      # Install a compatible .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.401'  # Must match global.json

      # Optional: verify SDK and compiler version
      - name: Check .NET version
        run: |
          dotnet --version
          dotnet --list-sdks
          dotnet --info

      # Clean old builds
      - name: Clean
        run: dotnet clean

      # Restore dependencies
      - name: Restore
        run: dotnet restore

      # Build the solution
      - name: Build
        run: dotnet build --no-restore
