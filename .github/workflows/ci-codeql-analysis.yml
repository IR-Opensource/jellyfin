name: .NET Build Jellyfin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Install SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.312'

      # 🚨 Force dotnet to use installed SDK (CRITICAL)
      - name: Force SDK
        run: echo "DOTNET_ROOT=$HOME/.dotnet" >> $GITHUB_ENV

      # Debug (you NEED this now)
      - name: Debug SDK
        run: |
          which dotnet
          dotnet --version
          dotnet --list-sdks
          dotnet --info

      # Clean everything (important)
      - name: Clean
        run: |
          dotnet clean
          rm -rf **/bin **/obj

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore
