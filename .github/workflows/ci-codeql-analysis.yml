name: .NET Build Jellyfin

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - uses: actions/checkout@v3

      # Install SDK that matches global.json
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.312'

      # Verify correct SDK is being used (important for debugging)
      - name: Verify .NET SDK
        run: |
          dotnet --version
          dotnet --list-sdks
          dotnet --info

      # Clean previous builds (prevents stale analyzer issues)
      - name: Clean
        run: dotnet clean

      # Restore dependencies
      - name: Restore
        run: dotnet restore

      # Build (analyzers should now work)
      - name: Build
        run: dotnet build --no-restore
