name: .NET Build Jellyfin

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.312'  # confirmed available SDK

      - name: Check .NET SDK
        run: |
          dotnet --version
          dotnet --list-sdks
          dotnet --info

      - name: Clean solution
        run: dotnet clean

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore
