name: .NET Build Jellyfin

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - uses: actions/checkout@v3

      # Install .NET SDK (latest 9.x is fine)
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      # Clean (prevents stale analyzer DLL issues)
      - name: Clean
        run: dotnet clean

      # Restore dependencies
      - name: Restore
        run: dotnet restore

      # Build (will NOT load analyzer in CI)
      - name: Build
        run: dotnet build --no-restore
