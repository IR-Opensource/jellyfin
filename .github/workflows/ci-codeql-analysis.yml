name: .NET Build xx IR

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Jellyfin

    steps:
      # Checkout the repository
      - uses: actions/checkout@v2

      # Install .NET 9 SDK pinned via global.json
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.312'

      # Restore dependencies
      - name: Restore dependencies
        run: dotnet restore

      # Build all projects; analyzers will run properly now
      - name: Build
        run: dotnet build --no-restore

      # Optional: run tests
      # - name: Test
      #   run: dotnet test --no-build --verbosity normal
